<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Allotment System</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
  <style>
    .card {
      margin: 15px;
    }
    .card img {
      object-fit: contain;
      height: 200px;
    }
    .card-deck {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar bg-body-tertiary">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">
        <img src="/static/logo.png" alt="Logo" width="90" height="70" class="d-inline-block align-text-top" />
        <b>Project Allotment System</b>
      </a>
    </div>
  </nav>

  <!-- Cards Section -->
  <div class="container mt-4">
    <div class="card-deck">

      <!-- Student Card -->
      <div class="card" style="width: 18rem;">
        <img src="/static/studentlogo.png" class="card-img-top" alt="Student Logo" />
        <div class="card-body text-center">
          <h5 class="card-title">Student</h5>
          <a href="{{ url_for('student_register') }}" class="btn btn-success m-1">Register</a>
          <a href="{{ url_for('student_login') }}" class="btn btn-primary m-1">Login</a>
        </div>
      </div>

      <!-- Faculty Card -->
      <div class="card" style="width: 18rem;">
        <img src="/static/facultylogo.png" class="card-img-top" alt="Faculty Logo" />
        <div class="card-body text-center">
          <h5 class="card-title">Faculty</h5>
          <a href="{{ url_for('faculty_login') }}" class="btn btn-primary">Login</a>
        </div>
      </div>

      <!-- Admin Card -->
      <div class="card" style="width: 18rem;">
        <img src="/static/admin.avif" class="card-img-top" alt="Admin Logo" />
        <div class="card-body text-center">
          <h5 class="card-title">Admin</h5>
          <a href="{{ url_for('admin_login') }}" class="btn btn-primary">Login</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
