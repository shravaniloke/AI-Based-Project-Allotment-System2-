<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Group Registration</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
</head>
<body>
  <nav class="navbar bg-body-tertiary">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">
        <img src="/static/logo.png" alt="Logo" width="90" height="70" class="d-inline-block align-text-top" />
        <b>Project Allotment System</b>
      </a>
    </div>
  </nav>

  <div class="container mt-4">
    <h5>Group Registration Form</h5>
    <form action="/studentregister" method="POST">
      <div class="mb-3">
        <input class="form-control" type="text" name="leader" placeholder="Group Leader" required />
      </div>
      <div class="mb-3">
        <input class="form-control" type="text" name="member1" placeholder="Group Member 1" />
      </div>
      <div class="mb-3">
        <input class="form-control" type="text" name="member2" placeholder="Group Member 2" />
      </div>
      <div class="mb-3">
        <input class="form-control" type="text" name="member3" placeholder="Group Member 3" />
      </div>

      <div class="mb-3">
      <label>Select Category:</label>
        <div>
          <select name="category" class="form-control" required>
            <option value="">--Select--</option>
                    
            {% for cat in categories %}
              <option value="{{ cat[0] }}">{{ cat[0] }}</option>
            {% endfor %}
                    
          </select>
        </div>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">Email address</label>
        <input type="email" class="form-control" id="email" name="email" required />
        <div id="emailHelp" class="form-text"></div>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" class="form-control" name="password" required />
        <div id="passwordHelpInline" class="form-text">Choose a secure password.</div>
      </div>

      <button type="submit" class="btn btn-primary">Register</button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
