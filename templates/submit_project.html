<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit Project</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

 
<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background-color: #f4f6f9;
    }
    .card {
        border-radius: 12px;
    }
</style>
 

</head>

<body>

<div class="container mt-5">

 
<!-- Header -->
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3>📤 Submit Project</h3>
    <a href="/studentdashboard" class="btn btn-secondary">⬅ Back</a>
</div>

<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card shadow-sm p-4">

            {% if submission %}

                <div class="alert alert-success text-center">
                    ✅ Project Already Submitted
                </div>

                <!-- View Report -->
                <div class="text-center mb-3">
                    <a href="{{ url_for('static', filename='uploads/' + submission[3]) }}" target="_blank" class="btn btn-primary">
                        👁️ View Report
                    </a>
                </div>

                <!-- Summary -->
                <div class="mb-3">
                    <h6>📄 Summary</h6>
                    <p class="text-muted">{{ submission[4] }}</p>
                </div>

                <!-- Keywords -->
                <div class="mb-3">
                    <h6>🔑 Keywords</h6>
                    <p>{{ submission[5] }}</p>
                </div>

                <!-- Plagiarism -->
                <div class="mb-3 text-center">
                    <span class="badge bg-warning text-dark p-2">
                        Plagiarism: {{ submission[6] }}
                    </span>
                </div>

                <!-- Edit Button -->
                <div class="text-center">
                    <button onclick="document.getElementById('editForm').style.display='block'" class="btn btn-warning">
                        ✏️ Edit / Re-upload
                    </button>
                </div>

                <!-- Hidden Form -->
                <div id="editForm" style="display:none;" class="mt-3">
                    <form method="POST" enctype="multipart/form-data">
                        <input type="file" name="report" class="form-control" required>
                        <button class="btn btn-success mt-2 w-100">Re-upload</button>
                    </form>
                </div>

            {% else %}

                <!-- First Time Upload -->
                <form method="POST" enctype="multipart/form-data">

                    <label class="mb-2">Upload Report:</label>
                    <input type="file" name="report" class="form-control" required>

                    <button class="btn btn-success mt-3 w-100">Submit Project</button>

                </form>

            {% endif %}

        </div>

    </div>
</div>
 

</div>

</body>
</html>
