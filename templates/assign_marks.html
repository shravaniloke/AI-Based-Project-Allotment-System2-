<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Assign Marks</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">


</head>

<body>

<div class="container mt-5">
    <h3>📝 Assign Marks</h3>


<form method="POST">

    <label>Leader Marks:</label>
    <input type="number" name="member1" class="form-control" required>

    <label class="mt-2">Member 1 Marks:</label>
    <input type="number" name="member2" class="form-control" required>

    <label class="mt-2">Member 2 Marks:</label>
    <input type="number" name="member3" class="form-control" required>

    <label class="mt-2">Member 3 Marks:</label>
    <input type="number" name="member4" class="form-control" required>

    <button class="btn btn-success mt-3">Submit Marks</button>
</form>


</div>

</body>
</html>
