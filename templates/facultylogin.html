<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Login</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">    

</head>
<body>
    <nav class="navbar bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">
      <img src="/static/logo.png" alt="" width="90" height="70" class="d-inline-block align-text-top">
      
      <b>Project Allotment System</b>
    </a>
  </div>
</nav>

<form action="/facultylogin" method="POST" class="container mt-4">
  <h5>Faculty Login Form</h5>
  <div class="mb-3">
    <label for="exampleInputEmail1" class="form-label">Email address</label>
    <input type="email" class="form-control" id="exampleInputEmail1" name="email" required>
    <div id="emailHelp" class="form-text">We'll never share your email.</div>
  </div>

  <div class="mb-3">
    <label for="inputPassword6" class="form-label">Password</label>
    <input type="password" id="inputPassword6" class="form-control" name="password" required>
    <div id="passwordHelpInline" class="form-text">Enter your secure password.</div>
  </div>

  <button type="submit" class="btn btn-primary">Login</button>
</form>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
