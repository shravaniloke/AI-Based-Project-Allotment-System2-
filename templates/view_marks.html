<!DOCTYPE html>

<html>
<head>
    <title>View Marks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">
    <h3>📊 Student Marks</h3>

  
<table class="table table-bordered text-center">
    <tr>
        <th>Leader</th>
        <th>Project</th>
        <th>Member</th>
        <th>Marks</th>
    </tr>

    {% for row in data %}
    <tr>
        <td>{{ row[0] }}</td>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }}</td>
        <td>{{ row[3] }}</td>
    </tr>
    {% endfor %}
</table>
  

</div>

</body>
</html>
