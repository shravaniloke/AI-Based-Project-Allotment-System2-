<!DOCTYPE html>
<html>
<head>
    <title>Faculty Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar bg-dark navbar-dark">
  <div class="container-fluid">
    <span class="navbar-brand mb-0 h1">Faculty Dashboard 👨‍🏫</span>
    <a href="/" class="btn btn-light">Logout</a>
  </div>
</nav>

<div class="container mt-4">

    <h3 class="text-center">Welcome Faculty 👨‍🏫</h3>

    <hr>

    <div class="row">

        <!-- Upload Projects -->
        <div class="col-md-4">
            <div class="card text-center shadow p-3">
                <h5>Upload Projects</h5>
                <p>Upload project list (CSV)</p>

                <form action="/uploadprojects" method="POST" enctype="multipart/form-data">
                    <input type="file" name="file" class="form-control mb-2" accept=".csv" required>
                    <button type="submit" class="btn btn-primary w-100">Upload</button>
                </form>
            </div>
        </div>

        <!-- View Projects -->
        <div class="col-md-4">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h5 class="card-title">Projects</h5>
                    <p class="card-text">View uploaded projects</p>
                    <a href="/viewprojectsforfaculty" class="btn btn-success">View</a>
                </div>
            </div>
        </div>

        <!-- Review Submissions -->
        <div class="col-md-4">
            <div class="card text-center shadow">
                <div class="card-body">
                    <h5 class="card-title">Submissions</h5>
                    <p class="card-text">Review student submissions</p>
                    <a href="/viewsubmissions" class="btn btn-warning">Review</a>
                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
