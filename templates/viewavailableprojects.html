<!DOCTYPE html>
<html>
<head>
    <title>Available Projects</title>
<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Available Projects</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background-color: #f5f7fa;
    }
    .card {
        border-radius: 12px;
    }
    .project-title {
        color: #2c3e50;
        font-weight: 600;
    }
    .category-badge {
        background-color: #0d6efd;
        color: white;
        padding: 5px 10px;
        border-radius: 8px;
        font-size: 12px;
    }
</style>


</head>

<body>

<div class="container mt-4">

<!-- Heading -->
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>📚 Available Projects</h2>
    <a href="/studentdashboard" class="btn btn-secondary">⬅ Back</a>
</div>

<!-- Projects -->
{% if projects %}

    <div class="row">

        {% for project in projects %}
        <div class="col-md-6">
            <div class="card shadow-sm p-3 mb-4">

                <!-- Title -->
                <h5 class="project-title">{{ project[1] }}</h5>

                <!-- Category -->
                <span class="category-badge mb-2">{{ project[3] }}</span>

                <!-- Description -->
                <p class="text-muted">{{ project[2] }}</p>

                <!-- Button Section -->
                {% if project[0] not in selected_projects %}
                    <form action="/selectproject" method="POST">
                        <input type="hidden" name="project_id" value="{{ project[0] }}">
                        <button class="btn btn-primary w-100">
                            Select Project
                        </button>
                    </form>
                {% else %}
                    <button class="btn btn-success w-100" disabled>
                        ✔ Already Selected
                    </button>
                {% endif %}

            </div>
        </div>
        {% endfor %}

    </div>

{% else %}

    <!-- No Projects -->
    <div class="alert alert-warning text-center">
        😕 No projects available for your selected category.
    </div>

{% endif %}


</div>

</body>
</html>

</body>
</html>
